<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
 <link id="icon" rel="icon" href="imagem/logotrue.png">

<style>
body{
    background-color: #f0d46c;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container{
    background-color: white;
    padding: 30px;
    border-radius: 10px;
    width: 300px;
    text-align: center;
}

input{
    width: 90%;
    padding: 10px;
    margin: 10px 0;
}

button{
    width: 100%;
    padding: 10px;
    background-color: orange;
    border: none;
    cursor: pointer;
}

</style>
</head>

<body>

<div class="container">
    <h2>Login</h2>

    <input type="text" placeholder="Usuário">
    <input type="password" placeholder="Senha">

    <button>Entrar</button>
</div>

</body>
</html>
